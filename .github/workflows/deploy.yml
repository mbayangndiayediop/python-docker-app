name: Python Flask CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Test Python Flask
    runs-on: ubuntu-latest

    steps:
      # Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installation de Python
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      # Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Lancer les tests unitaires
      - name: Run unit tests
        run: python -m unittest discover -s . -p "test_*.py"

      # Upload des fichiers si besoin
      - name: Upload Flask app as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-flask-app
          path: |
            app.py
            requirements.txt
            Dockerfile

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Flask artifact
        uses: actions/download-artifact@v4
        with:
          name: python-flask-app
          path: .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/python-flask-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/python-flask-app:latest
